<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MODA & ESTILO</title>
    <div id="head-placeholder"></div>
</head>
<body>
    <header id="header-placeholder"></header>

    <main>
        <!-- Hero Carousel -->
        <div id="carouselExampleFade" class="carousel slide carousel-fade" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://www.unir.net/wp-content/uploads/2022/01/moda-cabecera-1.jpg" 
                         class="d-block w-100" alt="MODA & ESTILO">
                </div>
                <div class="carousel-item">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhY8noBB5naX3ZJLs7jCvL9BdqSPgg3WkexJ2z9B2NfQ&s=10"
                         class="d-block w-100" alt="MODA & ESTILO">
                </div>
                <div class="carousel-item">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRUiOuU_bKJ6X4KHhFzmzoACf2JSFOJ1dVamnRfWGnU2g&s=10" 
                         class="d-block w-100" alt="MODA & ESTILO">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>


        <!-- Catálogo -->
        <section class="container mt-5 mb-5">
            <div class="catalog-header mb-4">
                <div class="d-flex justify-content-between align-items-start flex-wrap">
                    <div>
                        <small class="text-danger fw-bold text-uppercase">--- Nuestra colección</small>
                        <h2 class="display-6 fw-bold text-dark mb-3">Catálogo de productos</h2>
                        <div class="d-flex gap-2 flex-wrap" id="filtros-categoria">
                            <button class="btn btn-danger btn-sm categoria-btn active" data-id-categoria="todos">Todos</button>
                        </div>
                    </div>
                    <div class="mt-3 mt-md-0">
                        <input type="text" id="buscarProducto" class="form-control" placeholder="Buscar producto...">
                    </div>
                </div>
                <hr class="mt-4">
            </div>

            <div class="row g-4" id="lista-productos">
                <div class="text-center py-5">
                    <div class="spinner-border text-danger" role="status"></div>
                    <p class="mt-2">Cargando catálogo de productos...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Seleccionar Talla/Color -->
    <div class="modal fade" id="modalTallas" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-tags me-2"></i>
                        <span id="modal-producto-nombre">Producto</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-danger fw-bold fs-5 mb-3" id="modal-producto-precio"></p>

                    <!-- Spinner de carga -->
                    <div id="variantes-loading" class="text-center py-3 d-none">
                        <div class="spinner-border text-danger" role="status"></div>
                        <p class="small mt-2">Cargando variantes...</p>
                    </div>

                    <!-- Selectores desplegables -->
                    <div id="variantes-selectores" class="d-none">
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-rulers me-1 text-danger"></i> Talla:
                            </label>
                            <select id="select-talla" class="form-select">
                                <option value="">-- Selecciona una talla --</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="bi bi-palette me-1 text-danger"></i> Color:
                            </label>
                            <select id="select-color" class="form-select">
                                <option value="">-- Primero selecciona una talla --</option>
                            </select>
                        </div>

                        <!-- Info de stock de la variante seleccionada -->
                        <div id="stock-info" class="d-none mb-3">
                            <div class="alert alert-light border d-flex align-items-center gap-2 py-2 mb-0">
                                <i class="bi bi-box-seam text-danger"></i>
                                <span>Stock disponible: <strong id="stock-valor" class="text-danger">0</strong> unidades</span>
                            </div>
                        </div>

                        <div class="mb-1">
                            <label class="form-label fw-bold">
                                <i class="bi bi-hash me-1 text-danger"></i> Cantidad:
                            </label>
                            <input type="number" id="cantidad-variante" class="form-control" value="1" min="1" max="99">
                        </div>
                    </div>

                    <!-- Error -->
                    <div id="variantes-error" class="d-none">
                        <p class="text-danger text-center"><i class="bi bi-exclamation-circle me-1"></i>Error al cargar variantes.</p>
                    </div>
                    <!-- Sin variantes -->
                    <div id="variantes-empty" class="d-none">
                        <p class="text-muted text-center"><i class="bi bi-inbox me-1"></i>No hay variantes disponibles.</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger text-white fw-bold" id="btn-agregar-variante" disabled>
                        <i class="bi bi-cart-plus me-1"></i> Agregar al carrito
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer-placeholder"></footer>
    <script src="assets/js/main.js"></script>
</body>
</html>
