<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Compras — MODA & ESTILO</title>
</head>
<body>
    <div id="head-placeholder"></div>
    <header id="header-placeholder"></header>

    <main class="container mt-5 mb-5">
        <div class="d-flex align-items-center gap-3 mb-4">
            <div>
                <small class="text-danger fw-bold text-uppercase" style="letter-spacing:1px">--- Historial</small>
                <h2 class="display-6 fw-bold text-dark mb-0">Mis Compras</h2>
            </div>
        </div>

        <!-- Lista de pedidos -->
        <div id="lista-pedidos">
            <div class="text-center py-5">
                <div class="spinner-border text-danger" role="status"></div>
                <p class="mt-2 text-muted">Cargando tus pedidos...</p>
            </div>
        </div>

        <!-- Estado vacío -->
        <div id="empty-pedidos" class="text-center py-5 d-none">
            <div style="font-size:60px">🛍️</div>
            <h5 class="mt-3 text-muted">Aún no tienes compras</h5>
            <p class="text-muted small">Explora el catálogo y encuentra lo que más te gusta.</p>
            <a href="catalago.html" class="btn btn-danger mt-2">Ver catálogo</a>
        </div>
    </main>

    <!-- Modal Detalle Pedido -->
    <div class="modal fade" id="modalDetallePedido" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="bi bi-receipt me-2"></i>Detalle del Pedido <span id="modal-id-pedido"></span></h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-detalle-body">
                    <div class="text-center py-4">
                        <div class="spinner-border text-danger" role="status"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <footer id="footer-placeholder"></footer>
    <script src="assets/js/main.js"></script>
</body>
</html>
