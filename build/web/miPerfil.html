<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil — MODA & ESTILO</title>
</head>
<body>
    <div id="head-placeholder"></div>
    <header id="header-placeholder"></header>

    <main class="container mt-5 mb-5 perfil-container">
        <div class="mb-4">
            <small class="text-danger fw-bold text-uppercase perfil-section-label" >--- Cuenta</small>
            <h2 class="display-6 fw-bold text-dark mb-0">Mi Perfil</h2>
        </div>

        <!-- Avatar + nombre -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body d-flex align-items-center gap-4 py-4">
                <div class="perfil-avatar bg-danger text-white rounded-circle d-flex align-items-center justify-content-center fw-bold"
                     class="perfil-avatar d-flex align-items-center justify-content-center rounded-circle bg-danger text-white fw-bold" id="avatar-iniciales">?</div>
                <div>
                    <h4 class="mb-0 fw-bold" id="perfil-nombre-completo">Cargando...</h4>
                    <p class="text-muted mb-0 small" id="perfil-correo-header"></p>
                    <span class="badge bg-danger mt-1" id="perfil-rol"></span>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" id="perfilTabs">
            <li class="nav-item">
                <button class="nav-link active" data-tab="datos">
                    <i class="bi bi-person me-1"></i>Datos personales
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-tab="direcciones">
                    <i class="bi bi-geo-alt me-1"></i>Direcciones
                </button>
            </li>
        </ul>

        <!-- TAB: Datos personales -->
        <div id="tab-datos">
            <!-- Información de solo lectura -->
            <div class="card border-0 shadow-sm mb-3">
                <div class="card-body p-4">
                    <h6 class="fw-bold text-dark mb-3"><i class="bi bi-person me-2 text-danger"></i>Información de la cuenta</h6>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Nombre</label>
                            <div class="form-control bg-light border-0 text-dark" id="info-nombre" class="perfil-campo-readonly">—</div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Apellido Paterno</label>
                            <div class="form-control bg-light border-0 text-dark" id="info-apell-paterno" class="perfil-campo-readonly">—</div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-muted">Apellido Materno</label>
                            <div class="form-control bg-light border-0 text-dark" id="info-apell-materno" class="perfil-campo-readonly">—</div>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold text-muted">Correo electrónico</label>
                            <div class="form-control bg-light border-0 text-dark" id="info-correo" class="perfil-campo-readonly">—</div>
                        </div>
                    </div>
                    <p class="text-muted small mt-3 mb-0"><i class="bi bi-lock me-1"></i>Estos datos no pueden modificarse. Contacta al administrador si necesitas actualizarlos.</p>
                </div>
            </div>

            <!-- Campos editables: solo teléfono -->
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h6 class="fw-bold text-dark mb-3"><i class="bi bi-pencil-square me-2 text-danger"></i>Datos editables</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Teléfono</label>
                            <input type="text" id="edit-telefono" class="form-control" placeholder="987 654 321" maxlength="9">
                        </div>
                    </div>
                    <div class="d-flex justify-content-end mt-4">
                        <button class="btn btn-danger px-4" onclick="guardarDatos()">
                            <i class="bi bi-check2 me-1"></i>Guardar cambios
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB: Direcciones -->
        <div id="tab-direcciones" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold text-dark mb-0"><i class="bi bi-geo-alt me-2 text-danger"></i>Mis direcciones guardadas</h6>
                <button class="btn btn-danger btn-sm" onclick="mostrarFormDireccion()">
                    <i class="bi bi-plus-lg me-1"></i>Nueva dirección
                </button>
            </div>
            <div id="lista-direcciones">
                <div class="text-center py-4">
                    <div class="spinner-border text-danger spinner-border-sm" role="status"></div>
                </div>
            </div>

            <!-- Form nueva dirección -->
            <div id="form-nueva-direccion" class="card border-danger border-0 shadow-sm mt-3 d-none">
                <div class="card-body p-4">
                    <h6 class="fw-bold mb-3">Nueva dirección</h6>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Descripción / Referencia</label>
                        <input type="text" id="nueva-dir-descripcion" class="form-control" placeholder="Ej: Casa, Trabajo, etc.">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Dirección completa</label>
                        <textarea id="nueva-dir-detalle" class="form-control" rows="2"
                                  placeholder="Av. Los Pinos 123, Urb. Las Flores, Tarapoto"></textarea>
                    </div>
                    <div class="d-flex gap-2 justify-content-end">
                        <button class="btn btn-outline-secondary btn-sm" onclick="ocultarFormDireccion()">Cancelar</button>
                        <button class="btn btn-danger btn-sm" onclick="guardarDireccion()">Guardar dirección</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer-placeholder"></footer>
    <script src="assets/js/main.js"></script>
</body>
</html>
